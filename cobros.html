<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Cobros del Día</title>
    <link rel="stylesheet" href="css/variable.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--color-background);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            background-color: var(--color-primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            margin-right: 15px;
            display: flex;
            align-items: center;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .summary-card {
            background-color: var(--color-surface);
            margin: 15px 20px 5px 20px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            text-align: center;
        }

        .summary-item span {
            display: block;
            font-size: 0.75rem;
            color: #6B7280;
            margin-bottom: 4px;
        }

        .summary-item strong {
            font-size: 1.1rem;
            color: var(--color-text-main);
        }

        .summary-item .mamei-text {
            color: #FF6600;
        }

        .cobros-list {
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cobro-card {
            background-color: var(--color-surface);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.3s;
        }

        .cobro-card.pagado {
            opacity: 0.6;
        }

        .cobro-info h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .cobro-meta {
            font-size: 0.8rem;
            color: #6B7280;
        }

        .sector-badge {
            background-color: #F3F4F6;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 5px;
            font-weight: 600;
        }

        .cobro-action {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .monto-cuota {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-text-main);
        }

        .btn-cobrar {
            background-color: #FF6600;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(255, 102, 0, 0.15);
        }

        .badge-cobrado {
            background-color: #10B981;
            color: white;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        /* ESTILOS DEL MODAL FLOTANTE */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: white;
            width: 90%;
            max-width: 400px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-header h2 {
            font-size: 1.15rem;
            color: var(--color-text-main);
        }

        .modal-header p {
            font-size: 0.85rem;
            color: #6B7280;
            margin-top: 2px;
        }

        .modal-body label {
            font-size: 0.85rem;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        .modal-body input {
            width: 100%;
            padding: 12px;
            border: 2px solid #D1D5DB;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--color-text-main);
            text-align: center;
        }

        .modal-body input:focus {
            outline: none;
            border-color: #FF6600;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
        }

        .btn-cancelar {
            flex: 1;
            background-color: #E5E7EB;
            color: var(--color-text-main);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-confirmar {
            flex: 1;
            background-color: #FF6600;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 102, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <a href="index.html" class="back-btn">⬅</a>
            <h1>Cobros de Hoy</h1>
        </header>

        <div class="summary-card">
            <div class="summary-item">
                <span>Por Cobrar Hoy</span>
                <strong id="total-por-cobrar">$0.00</strong>
            </div>
            <div class="summary-item">
                <span>Recaudado</span>
                <strong class="mamei-text" id="total-recaudado">$0.00</strong>
            </div>
        </div>

        <main class="cobros-list" id="contenedor-cobros">
            <p style="text-align: center; padding: 20px; color: #6B7280;">Buscando ruta en la nube...</p>
        </main>
    </div>

    <div class="modal-overlay" id="modal-cobro">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-cliente-nombre">Cobrar a Cliente</h2>
                <p id="modal-cuota-sugerida">Cuota regular: $0.00</p>
            </div>
            <div class="modal-body">
                <label for="monto-ingresado">Monto Recibido ($)</label>
                <input type="number" id="monto-ingresado" step="0.01" min="0">
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" id="btn-cerrar-modal">Cancelar</button>
                <button class="btn-confirmar" id="btn-guardar-pago">Confirmar Pago</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const idEmpresaLogueada = localStorage.getItem('id_empresa');
        if (!idEmpresaLogueada) {
            window.location.href = "login.html";
        }

        let recaudado = 0.00;
        let porCobrar = 0.00;
        
        let idPrestamoSeleccionado = null;
        let numeroCuotaSeleccionada = 0;
        let cuotaSugeridaSeleccionada = 0;
        let datosCompletosPrestamo = null;

        const modalCobro = document.getElementById('modal-cobro');
        const modalClienteNombre = document.getElementById('modal-cliente-nombre');
        const modalCuotaSugerida = document.getElementById('modal-cuota-sugerida');
        const montoIngresadoInput = document.getElementById('monto-ingresado');
        const btnCerrarModal = document.getElementById('btn-cerrar-modal');
        const btnGuardarPago = document.getElementById('btn-guardar-pago');

        window.addEventListener('DOMContentLoaded', async () => {
            await cargarCobrosDelDia();
            btnCerrarModal.addEventListener('click', cerrarModalCobro);
            btnGuardarPago.addEventListener('click', procesarPagoYTicket);
        });

        async function cargarCobrosDelDia() {
            const contenedor = document.getElementById('contenedor-cobros');
            contenedor.innerHTML = '<p style="text-align: center; padding: 20px; color: #6B7280;">Buscando cuotas pendientes...</p>';
            
            try {
                const q = query(collection(db, "prestamos"), where("id_empresa", "==", idEmpresaLogueada), where("status", "==", "Activo"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    contenedor.innerHTML = '<p style="text-align: center; padding: 20px; color: #6B7280;">No hay cobros pendientes registrados para hoy.</p>';
                    document.getElementById('total-por-cobrar').innerText = "$0.00";
                    document.getElementById('total-recaudado').innerText = "$0.00";
                    return;
                }

                contenedor.innerHTML = "";
                porCobrar = 0;
                recaudado = 0; // Reiniciamos para calcular limpiamente desde la base de datos
                
                // Obtenemos la fecha de hoy en formato DD-MM-YYYY
                const hoy = new Date();
                const dia = String(hoy.getDate()).padStart(2, '0');
                const mes = String(hoy.getMonth() + 1).padStart(2, '0');
                const anio = hoy.getFullYear();
                const fechaHoyStr = `${dia}-${mes}-${anio}`;

                const clientesCache = {};

                for (const documento of querySnapshot.docs) {
                    const prestamo = documento.data();
                    const idPrestamo = documento.id;
                    
                    // 1. Buscamos si hay cobros que se hicieron HOY para sumarlos al Recaudado del día
                    if (prestamo.cuotas_detalle) {
                        prestamo.cuotas_detalle.forEach(cuota => {
                            if (cuota.fecha_pago === fechaHoyStr) {
                                recaudado += (cuota.monto_ultimo_pago_dia || cuota.monto_cuota);
                            }
                        });
                    }

                    // 2. Buscamos la cuota que está actualmente pendiente o abonada para mostrar en la lista
                    const cuotaPendiente = prestamo.cuotas_detalle.find(c => c.status === 'Pendiente' || c.status === 'Abonado');

                    if (cuotaPendiente) {
                        const montoFaltante = cuotaPendiente.monto_cuota - (cuotaPendiente.monto_abonado || 0);
                        porCobrar += montoFaltante;

                        let nombreCliente = "Cliente Desconocido";
                        let sector = "General";

                        if (clientesCache[prestamo.id_cliente]) {
                            nombreCliente = clientesCache[prestamo.id_cliente].nombre;
                            sector = clientesCache[prestamo.id_cliente].sector;
                        } else {
                            const clientDoc = await getDoc(doc(db, "clientes_prestamo", prestamo.id_cliente));
                            if (clientDoc.exists()) {
                                nombreCliente = clientDoc.data().nombre;
                                sector = clientDoc.data().ruta_sector || "General";
                                clientesCache[prestamo.id_cliente] = { nombre: nombreCliente, sector: sector };
                            }
                        }

                        // Validar número de cuota para evitar el 'undefined'
                        const nCuota = cuotaPendiente.numero || cuotaPendiente.numero_cuota || cuotaPendiente.id_cuota || "?";

                        const card = document.createElement('div');
                        card.className = "cobro-card";
                        card.id = `card-${idPrestamo}`;
                        card.innerHTML = `
                            <div class="cobro-info">
                                <h3>${nombreCliente} <span class="sector-badge">${sector}</span></h3>
                                <p class="cobro-meta">Cuota #${nCuota} - Vence: ${cuotaPendiente.fecha_vencimiento}</p>
                                ${cuotaPendiente.monto_abonado > 0 ? `<p class="cobro-meta" style="color: #FF6600; font-weight:bold;">Abonado previamente: $${cuotaPendiente.monto_abonado.toFixed(2)}</p>` : ''}
                            </div>
                            <div class="cobro-action">
                                <span class="monto-cuota">$${montoFaltante.toFixed(2)}</span>
                                <button class="btn-cobrar" id="btn-${idPrestamo}">Cobrar</button>
                                <span class="badge-cobrado" id="badge-${idPrestamo}" style="display: none;">Cobrado</span>
                            </div>
                        `;
                        contenedor.appendChild(card);

                        document.getElementById(`btn-${idPrestamo}`).addEventListener('click', () => {
                            abrirModalCobro(idPrestamo, nombreCliente, nCuota, montoFaltante, prestamo);
                        });
                    }
                }

                // Pintamos los totales finales en las tarjetas superiores
                document.getElementById('total-por-cobrar').innerText = `$${porCobrar.toFixed(2)}`;
                document.getElementById('total-recaudado').innerText = `$${recaudado.toFixed(2)}`;

                if(contenedor.innerHTML === "") {
                    contenedor.innerHTML = '<p style="text-align: center; padding: 20px; color: #6B7280;">No quedan cuotas pendientes por procesar.</p>';
                }

            } catch (error) {
                console.error("Error al cargar cobros: ", error);
                contenedor.innerHTML = '<p style="text-align: center; padding: 20px; color: red;">Error al sincronizar con la nube.</p>';
            }
        }

        function abrirModalCobro(idPrestamo, nombre, numCuota, montoFaltante, prestamoCompleto) {
            idPrestamoSeleccionado = idPrestamo;
            numeroCuotaSeleccionada = numCuota;
            cuotaSugeridaSeleccionada = montoFaltante;
            datosCompletosPrestamo = prestamoCompleto;

            modalClienteNombre.innerText = nombre;
            modalCuotaSugerida.innerText = `Balance de la cuota: $${montoFaltante.toFixed(2)}`;
            montoIngresadoInput.value = montoFaltante.toFixed(2);
            modalCobro.classList.add('open');
            montoIngresadoInput.focus();
        }

        function cerrarModalCobro() {
            modalCobro.classList.remove('open');
            montoIngresadoInput.value = "";
        }

        async function procesarPagoYTicket() {
            const montoPago = parseFloat(montoIngresadoInput.value);
            if (isNaN(montoPago) || montoPago <= 0) {
                alert("Por favor ingresa un monto válido.");
                return;
            }

            btnGuardarPago.disabled = true;
            btnGuardarPago.innerText = "Guardando...";

            try {
                // Obtenemos la fecha de hoy para el registro del pago
                const hoy = new Date();
                const dia = String(hoy.getDate()).padStart(2, '0');
                const mes = String(hoy.getMonth() + 1).padStart(2, '0');
                const anio = hoy.getFullYear();
                const fechaHoyStr = `${dia}-${mes}-${anio}`;

                const prestamoRef = doc(db, "prestamos", idPrestamoSeleccionado);
                
                const cuotasActualizadas = datosCompletosPrestamo.cuotas_detalle.map(cuota => {
                    const nCuota = cuota.numero || cuota.numero_cuota || cuota.id_cuota;
                    
                    if (nCuota === numeroCuotaSeleccionada) {
                        const abonoPrevio = cuota.monto_abonado || 0;
                        const nuevoMontoAbonado = abonoPrevio + montoPago;

                        if (nuevoMontoAbonado >= cuota.monto_cuota) {
                            cuota.status = 'Pagado';
                        } else {
                            cuota.status = 'Abonado';
                        }
                        
                        cuota.monto_abonado = nuevoMontoAbonado;
                        cuota.fecha_pago = fechaHoyStr; // 📅 Guardamos el día del cobro
                        cuota.monto_ultimo_pago_dia = montoPago; // 💰 Guardamos cuánto pagó hoy
                    }
                    return cuota;
                });

                // Guardamos en Firebase (Usando prestamoRef corregido)
                await updateDoc(prestamoRef, { cuotas_detalle: cuotasActualizadas });

                alert("¡Cobro guardado con éxito en la nube!");
                cerrarModalCobro();
                
                // Recarga la lista completa recalculando los totales reales desde Firebase
                await cargarCobrosDelDia(); 

            } catch (error) {
                console.error("Error al procesar el cobro: ", error);
                alert("Hubo un error al guardar el pago.");
            } finally {
                btnGuardarPago.disabled = false;
                btnGuardarPago.innerText = "Confirmar Pago";
            }
        }
    </script>
</body>
</html>
