<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const idEmpresaLogueada = localStorage.getItem('id_empresa');
        if (!idEmpresaLogueada) {
            window.location.href = "login.html";
        }

        let recaudado = 0.00;
        let porCobrar = 0.00;
        
        let idPrestamoSeleccionado = null;
        let numeroCuotaSeleccionada = 0;
        let cuotaSugeridaSeleccionada = 0;
        let datosCompletosPrestamo = null;

        // Elementos del Modal
        const modalCobro = document.getElementById('modal-cobro');
        const modalClienteNombre = document.getElementById('modal-cliente-nombre');
        const modalCuotaSugerida = document.getElementById('modal-cuota-sugerida');
        const montoIngresadoInput = document.getElementById('monto-ingresado');
        const btnCerrarModal = document.getElementById('btn-cerrar-modal');
        const btnGuardarPago = document.getElementById('btn-guardar-pago');

        window.addEventListener('DOMContentLoaded', async () => {
            await cargarCobrosDelDia();
            
            // Eventos para cerrar el modal
            btnCerrarModal.addEventListener('click', cerrarModalCobro);
            btnGuardarPago.addEventListener('click', procesarPagoYTicket);
        });

        async function cargarCobrosDelDia() {
            const contenedor = document.getElementById('contenedor-cobros');
            contenedor.innerHTML = '<p style="text-align: center; padding: 20px; color: #6B7280;">Buscando cuotas pendientes...</p>';
            
            try {
                const q = query(collection(db, "prestamos"), where("id_empresa", "==", idEmpresaLogueada), where("status", "==", "Activo"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    contenedor.innerHTML = '<p style="text-align: center; padding: 20px; color: #6B7280;">No hay cobros pendientes registrados para hoy.</p>';
                    document.getElementById('total-por-cobrar').innerText = "$0.00";
                    return;
                }

                contenedor.innerHTML = "";
                porCobrar = 0;
                const sectoresCache = {};

                for (const documento of querySnapshot.docs) {
                    const prestamo = documento.data();
                    const idPrestamo = documento.id;
                    const cuotaPendiente = prestamo.cuotas_detalle.find(c => c.status === 'Pendiente');

                    if (cuotaPendiente) {
                        porCobrar += cuotaPendiente.monto_cuota;

                        let sector = "Sin sector";
                        if (sectoresCache[prestamo.id_cliente]) {
                            sector = sectoresCache[prestamo.id_cliente];
                        } else {
                            const clientDoc = await getDoc(doc(db, "clientes_prestamo", prestamo.id_cliente));
                            if (clientDoc.exists()) {
                                sector = clientDoc.data().ruta_sector || "General";
                                sectoresCache[prestamo.id_cliente] = sector;
                            }
                        }

                        const card = document.createElement('div');
                        card.className = "cobro-card";
                        card.id = `card-${idPrestamo}`;
                        card.innerHTML = `
                            <div class="cobro-info">
                                <h3>${prestamo.nombre_cliente}</h3>
                                <div class="cobro-meta">
                                    Cuota #${cuotaPendiente.numero_cuota} de ${prestamo.cuotas_totales} <span class="sector-badge">${sector}</span>
                                </div>
                            </div>
                            <div class="cobro-action">
                                <div class="monto-cuota" id="monto-original-${idPrestamo}">$${cuotaPendiente.monto_cuota.toFixed(2)}</div>
                                <button class="btn-cobrar" id="btn-cobrar-${idPrestamo}">Cobrar</button>
                                <span class="badge-cobrado" id="badge-${idPrestamo}"></span>
                            </div>
                        `;

                        contenedor.appendChild(card);

                        card.querySelector(`#btn-cobrar-${idPrestamo}`).addEventListener('click', () => {
                            idPrestamoSeleccionado = idPrestamo;
                            numeroCuotaSeleccionada = cuotaPendiente.numero_cuota;
                            cuotaSugeridaSeleccionada = cuotaPendiente.monto_cuota;
                            datosCompletosPrestamo = prestamo;

                            abrirModalCobro(prestamo.nombre_cliente, cuotaSugeridaSeleccionada);
                        });
                    }
                }
                document.getElementById('total-por-cobrar').innerText = `$${porCobrar.toFixed(2)}`;
            } catch (error) {
                console.error("Error cargando cobros:", error);
                contenedor.innerHTML = '<p style="text-align: center; padding: 20px; color: red;">Error al sincronizar con la nube.</p>';
            }
        }

        function abrirModalCobro(nombre, cuota) {
            modalClienteNombre.innerText = nombre;
            modalCuotaSugerida.innerText = `Cuota regular: $${cuota.toFixed(2)}`;
            montoIngresadoInput.value = cuota.toFixed(2);
            modalCobro.classList.add('open');
            setTimeout(() => montoIngresadoInput.focus(), 200);
        }

        function cerrarModalCobro() {
            modalCobro.classList.remove('open');
            idPrestamoSeleccionado = null;
            datosCompletosPrestamo = null;
        }

        // ==========================================
        // PROCESAR EL PAGO Y LANZAR TICKET DE COBRO
        // ==========================================
        async function procesarPagoYTicket() {
            const montoPagar = parseFloat(montoIngresadoInput.value);
            if (isNaN(montoPagar) || montoPagar <= 0) {
                alert("Por favor, ingresa un monto válido.");
                return;
            }

            btnGuardarPago.disabled = true;
            btnGuardarPago.innerText = "Guardando...";

            try {
                const prestamoRef = doc(db, "prestamos", idPrestamoSeleccionado);
                
                // Modificar el estatus de la cuota seleccionada en el array local
                const cuotasActualizadas = datosCompletosPrestamo.cuotas_detalle.map(cuota => {
                    if (cuota.numero_cuota === numeroCuotaSeleccionada) {
                        return { ...cuota, status: 'Pagado', monto_pagado: montoPagar, fecha_pago: new Date().toISOString().split('T')[0] };
                    }
                    return cuota;
                });

                // Verificar si quedan más cuotas pendientes
                const tieneMasPendientes = cuotasActualizadas.some(c => c.status === 'Pendiente');
                const nuevoEstatusPrestamo = tieneMasPendientes ? 'Activo' : 'Finalizado';

                // Guardar en Firestore
                await updateDoc(prestamoRef, {
                    cuotas_detalle: cuotasActualizadas,
                    status: nuevoEstatusPrestamo
                });

                // Calcular balance restante aproximado para el ticket
                const balanceRestante = cuotasActualizadas
                    .filter(c => c.status === 'Pendiente')
                    .reduce((sum, c) => sum + c.monto_cuota, 0);

                // --- ENVIAR ORDEN DE IMPRESIÓN DEL RECIBO A RAWBT ---
                const fechaHoy = new Date().toLocaleDateString('es-DO');
                const horaHoy = new Date().toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' });

                let textoRecibo = 
                    "================================\n" +
                    "         PRESTACOM 2.0          \n" +
                    "       RECIBO DE COBRO          \n" +
                    "================================\n" +
                    `Fecha: ${fechaHoy}   Hora: ${horaHoy}\n` +
                    `Cliente: ${datosCompletosPrestamo.nombre_cliente}\n` +
                    "--------------------------------\n" +
                    `Cuota cobrada: #${numeroCuotaSeleccionada}\n` +
                    `Monto Pagado:  $${montoPagar.toFixed(2)}\n` +
                    "--------------------------------\n" +
                    `Balance Restante: $${balanceRestante.toFixed(2)}\n` +
                    "================================\n" +
                    "   ¡Cobro registrado con exito!   \n\n\n\n";

                // Redirección directa hacia la API de RawBT en Android
                window.location.href = "rawbt:base64," + btoa(unescape(encodeURIComponent(textoRecibo)));

                // Actualizar interfaz visual
                recaudado += montoPagar;
                porCobrar -= cuotaSugeridaSeleccionada;
                document.getElementById('total-recaudado').innerText = `$${recaudado.toFixed(2)}`;
                document.getElementById('total-por-cobrar').innerText = `$${porCobrar.toFixed(2)}`;

                // Marcar tarjeta como pagada
                const tarjeta = document.getElementById(`card-${idPrestamoSeleccionado}`);
                if (tarjeta) {
                    tarjeta.classList.add('pagado');
                    tarjeta.querySelector(`#btn-cobrar-${idPrestamoSeleccionado}`).style.display = 'none';
                    const badge = tarjeta.querySelector(`#badge-${idPrestamoSeleccionado}`);
                    badge.style.display = 'block';
                    badge.style.color = '#10B981';
                    badge.innerText = `Pagado $${montoPagar.toFixed(2)}`;
                }

                cerrarModalCobro();

            } catch (error) {
                console.error("Error al procesar el cobro:", error);
                alert("Hubo un error al guardar el pago.");
            } finally {
                btnGuardarPago.disabled = false;
                btnGuardarPago.innerText = "Confirmar Pago";
            }
        }

        // =========================================================================
        // 📜 NOTA EXTRA: FUNCIÓN PARA EL TICKET DE CONTRATO (NUEVO PRÉSTAMO)
        // Puedes copiar esta lógica y adaptarla en tu pantalla de generar préstamos
        // =========================================================================
        function imprimirTicketContrato(nombreCliente, capital, interesPorcentaje, totalPagar, cuotasTotales, valorCuota) {
            const fechaHoy = new Date().toLocaleDateString('es-DO');
            
            let textoContrato = 
                "================================\n" +
                "         PRESTACOM 2.0          \n" +
                "        CONTRATO DE PAGO        \n" +
                "================================\n" +
                `Fecha Emision: ${fechaHoy}\n` +
                `Cliente: ${nombreCliente}\n` +
                "--------------------------------\n" +
                `Capital prestado: $${parseFloat(capital).toFixed(2)}\n` +
                `Interes aplicado: ${interesPorcentaje}%\n` +
                `Total a devolver: $${parseFloat(totalPagar).toFixed(2)}\n` +
                `Distribucion: ${cuotasTotales} cuotas de $${parseFloat(valorCuota).toFixed(2)}\n` +
                "--------------------------------\n" +
                "Por este medio acepto y me\n" +
                "comprometo formalmente a pagar\n" +
                "la suma antes mencionada en las\n" +
                "fechas y cuotas acordadas.\n\n" +
                "Firma Deudor:\n\n\n" +
                "--------------------------------\n\n" +
                "Firma Garante:\n\n\n" +
                "--------------------------------\n" +
                "   Conserve este comprobante    \n" +
                "================================\n\n\n\n";

            window.location.href = "rawbt:base64," + btoa(unescape(encodeURIComponent(textoContrato)));
        }
    </script>
