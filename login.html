<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/variable.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            flex-direction: column; /* Permite alinear el copyright debajo del cuadro */
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--color-surface);
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
            text-align: center;
        }

        .logo-placeholder {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.6rem;
            color: var(--color-text-main);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #6B7280;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text-main);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #FAFAFA;
        }

        input:focus {
            outline: none;
            border-color: #FF6600;
            background-color: #FFFFFF;
        }

        .btn-login {
            width: 100%;
            background-color: #FF6600;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 102, 0, 0.2);
            margin-top: 10px;
        }

        .btn-login:active {
            background-color: #E05500;
        }

        .error-message {
            color: #C0392B;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 12px;
            display: none;
        }

        /* ESTILOS DE DERECHOS RESERVADOS Y PROPIETARIO */
        .credits-container {
            margin-top: 25px;
            text-align: center;
            font-size: 0.75rem;
            color: #9CA3AF;
            line-height: 1.5;
        }

        .credits-container .version {
            font-weight: bold;
            color: #6B7280;
            background-color: #E5E7EB;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .credits-container .owner {
            font-weight: 600;
            color: var(--color-text-main);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-placeholder">💵</div>
        <h1>PRESTACOM</h1>
        <p class="subtitle">Sistema de Control de Préstamos</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="error-message" id="error-txt">Correo o contraseña incorrectos.</div>

            <button type="submit" class="btn-login">Ingresar al Sistema</button>
        </form>
    </div>

    <div class="credits-container">
        <span class="version">Versión 2.0.0</span><br>
        <span>© 2026 Todos los derechos reservados.</span><br>
        <span>Desarrollado por: <span class="owner">Santo Sixto Frias</span></span>
<span>Correo electronico <span class="owner">santosixto@gmail.com</span></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorTxt = document.getElementById('error-txt');
            
            errorTxt.style.display = 'none';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDocRef = doc(db, "usuarios_empleados", user.uid);
                const userDoc = await getDoc(userDocRef);

                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    localStorage.setItem('id_empresa', userData.id_empresa);
                    localStorage.setItem('nombre_usuario', userData.nombre);
                    localStorage.setItem('rol_usuario', userData.rol);

                    window.location.href = "index.html";
                } else {
                    errorTxt.innerText = "Error: El perfil de usuario no está configurado en la base de datos.";
                    errorTxt.style.display = 'block';
                }

            } catch (error) {
                console.error("Error en Login:", error.code);
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorTxt.innerText = "Correo o contraseña incorrectos.";
                } else {
                    errorTxt.innerText = "Error de conexión. Inténtalo de nuevo.";
                }
                errorTxt.style.display = 'block';
            }
        });
    </script>

</body>
</html>
